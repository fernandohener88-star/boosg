name: Scrape Leads

on:
  workflow_dispatch:
    inputs:
      apify_key:
        description: "Dein Apify API Key"
        required: true
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          APIFY_API_KEY: ${{ inputs.apify_key }}
        run: python scrape_leads.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: leads-ohne-website
          path: leads_ohne_website_*.csv
          retention-days: 30

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add leads_ohne_website_*.csv
          git diff --staged --quiet || git commit -m "Add scraped leads CSV"
          git push
